<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZBYTEE - User Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .main-content { padding-top: 6rem; transition: var(--transition); padding: 3rem; }
        @media (max-width: 768px) { .main-content { margin-left: 0; } }
    </style>
</head>
<body class="flex min-h-screen bg-[#0f172a]">

    <!-- SIDEBAR -->
    <aside id="sidebar"></aside>

    <!-- CONTENT -->
    <main class="main-content flex-grow animate-fade">
        <header class="mb-16 flex flex-col md:flex-row md:items-center gap-10">
            <div class="relative group">
                <div class="w-40 h-40 rounded-[3rem] bg-indigo-600/10 border-4 border-indigo-600/20 overflow-hidden shadow-2xl group-hover:scale-105 transition-all">
                    <img id="profile-img" src="https://i.pravatar.cc/150?u=user" alt="avatar">
                </div>
                <button class="absolute -bottom-2 -right-2 w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white border-4 border-slate-900 shadow-xl hover:scale-110 active:scale-95 transition-all">
                    <i data-lucide="camera" class="w-5 h-5"></i>
                </button>
            </div>
            <div>
                <h1 class="text-5xl font-black font-outfit mb-2 tracking-tight" id="profile-name">Explorer</h1>
                <p class="text-slate-500 font-bold text-lg mb-6" id="profile-email">user@email.com</p>
                <div class="flex gap-4">
                    <button class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black text-sm hover:bg-indigo-500 transition-all active:scale-95">Edit Profile</button>
                    <button class="glass px-8 py-3 rounded-2xl font-black text-sm text-slate-400 hover:text-white transition-all active:scale-95">Settings</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <!-- LEFT: PERFORMANCE -->
            <div class="space-y-10">
                <h2 class="text-2xl font-black font-outfit flex items-center gap-4">
                    Performance Stats
                    <div class="h-1 flex-grow bg-slate-800/50 rounded-full"></div>
                </h2>
                <div class="grid grid-cols-2 gap-6">
                    <div class="glass p-8 rounded-3xl space-y-2 border-slate-700/30">
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-500">Average Score</p>
                        <h3 class="text-4xl font-black font-outfit text-emerald-400" id="profile-accuracy">87%</h3>
                    </div>
                    <div class="glass p-8 rounded-3xl space-y-2 border-slate-700/30">
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-500">Quiz Count</p>
                        <h3 class="text-4xl font-black font-outfit text-indigo-400" id="profile-quizzes">24</h3>
                    </div>
                    <div class="glass p-8 rounded-3xl space-y-2 border-slate-700/30">
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-500">Total Points</p>
                        <h3 class="text-4xl font-black font-outfit text-amber-400" id="profile-points">12,450</h3>
                    </div>
                    <div class="glass p-8 rounded-3xl space-y-2 border-slate-700/30">
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-500">Global Rank</p>
                        <h3 class="text-4xl font-black font-outfit text-slate-300">#142</h3>
                    </div>
                </div>
            </div>

            <!-- RIGHT: BADGES -->
            <div class="space-y-10">
                <h2 class="text-2xl font-black font-outfit flex items-center gap-4">
                    Recent Badges
                    <div class="h-1 flex-grow bg-slate-800/50 rounded-full"></div>
                </h2>
                <div class="grid grid-cols-2 gap-4" id="profile-badges">
                    <!-- Badges injected here -->
                </div>
            </div>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        const user = Auth.user;
        if (user) {
            document.getElementById('profile-name').innerText = user.name;
            document.getElementById('profile-email').innerText = user.email;
            document.getElementById('profile-img').src = `https://i.pravatar.cc/150?u=${user.email}`;
            document.getElementById('profile-accuracy').innerText = user.accuracy + '%';
            document.getElementById('profile-quizzes').innerText = user.quizzes;
            document.getElementById('profile-points').innerText = (user.quizzes * 500).toLocaleString();

            const grid = document.getElementById('profile-badges');
            if (user.badges.length === 0) {
                grid.innerHTML = '<p class="text-slate-500 italic col-span-2">No badges yet.</p>';
            } else {
                grid.innerHTML = user.badges.map(b => `
                    <div class="glass p-4 rounded-2xl flex flex-col items-center justify-center text-center gap-3 border-indigo-500/10">
                        <span class="text-4xl">${b.split(' ')[1] || '🏆'}</span>
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">${b.split(' ')[0]}</span>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
