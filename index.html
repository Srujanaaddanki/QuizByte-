<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZBYTEE - Splash</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #0f172a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2rem;
            overflow: hidden;
        }
        .logo-container {
            position: relative;
            animation: zoomIn 1.5s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }
        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            background: linear-gradient(to bottom right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(129, 140, 248, 0.3));
        }
        .logo-subtext {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #6366f1;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
            text-align: center;
        }
        @keyframes zoomIn {
            0% { transform: scale(0.5); opacity: 0; filter: blur(20px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <h1 class="logo-text">QUIZBYTEE</h1>
        <p class="logo-subtext">Elevate Your Mind</p>
    </div>

    <script>
        // Check if user is logged in
        const user = localStorage.getItem('qb_user');
        
        // Wait 3 seconds, then redirect
        setTimeout(() => {
            if (user) {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'login.html';
            }
        }, 3000);
    </script>
</body>
</html>
