<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZBYTEE - Signup</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: var(--bg-primary); }
    </style>
</head>
<body class="auth-container">

    <div class="auth-card glass animate-fade">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black font-outfit mb-2 tracking-tight">Create Account</h1>
            <p class="text-slate-400 font-medium">Join thousands of curious minds!</p>
        </div>

        <form id="signupForm" class="space-y-6">
            <div class="input-group">
                <label>Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                    <input type="email" id="email" required placeholder="name@email.com" class="pl-16">
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                    <input type="password" id="password" required placeholder="••••••••" class="pl-16">
                </div>
            </div>

            <div class="flex items-center gap-3 text-sm">
                <label class="flex items-center gap-3 cursor-pointer group">
                    <input type="checkbox" id="terms" required class="w-5 h-5 rounded border-slate-700 bg-slate-800 text-indigo-600 focus:ring-indigo-500">
                    <span class="text-slate-400 group-hover:text-slate-300 font-bold transition-all">I agree to the Terms of Service</span>
                </label>
            </div>

            <button type="submit" class="btn-primary flex items-center justify-center gap-4 text-xl shadow-xl shadow-indigo-600/20 active:scale-95 transition-all">
                Sign Up
                <i data-lucide="user-plus"></i>
            </button>
        </form>

        <div class="mt-10 text-center text-slate-400 text-sm">
            Already have an account? 
            <a href="login.html" class="text-indigo-400 font-black ml-1 hover:text-indigo-300 transition-all">Sign in</a>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('signupForm').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            Auth.signup(email, password);
        };
    </script>
</body>
</html>
