<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZBYTEE - Explore</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .main-content { padding-top: 6rem; transition: var(--transition); padding: 3rem; }
        @media (max-width: 768px) { .main-content { margin-left: 0; } }
        .horizontal-scroll { overflow-x: auto; display: flex; gap: 2rem; padding: 2rem 0; scroll-snap-type: x mandatory; }
        .horizontal-scroll::-webkit-scrollbar { height: 8px; }
        .horizontal-scroll::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.2); border-radius: 4px; }
        .subject-card { min-width: 320px; scroll-snap-align: start; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside id="sidebar"></aside>

    <!-- CONTENT -->
    <main class="main-content flex-grow animate-fade">
        <header class="mb-16">
            <h1 class="text-5xl font-black font-outfit mb-2 tracking-tight">Explore Subjects</h1>
            <p class="text-slate-500 font-bold text-lg">Pick a domain and start your challenge!</p>
        </header>

        <section class="horizontal-scroll" id="subjects-container">
            <!-- Subjects will be injected here -->
        </section>

        <div class="mt-20">
            <h2 class="text-3xl font-black font-outfit mb-10 flex items-center gap-4">
                Recommended for You
                <div class="h-1 flex-grow bg-slate-800/50 rounded-full"></div>
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="card glass border-indigo-500/20 hover:border-indigo-500 cursor-pointer">
                    <h3 class="text-2xl font-bold mb-4">Physics Deep Dive</h3>
                    <p class="text-slate-500 mb-6 font-medium">Explore the laws of the universe with 20 advanced MCQs.</p>
                    <div class="flex items-center justify-between">
                       <span class="bg-red-500/10 text-red-400 px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest">Expert</span>
                       <span class="text-slate-400 font-bold">15 Questions</span>
                    </div>
                </div>
                <div class="card glass border-indigo-500/20 hover:border-indigo-500 cursor-pointer">
                    <h3 class="text-2xl font-bold mb-4">Ancient Civilizations</h3>
                    <p class="text-slate-500 mb-6 font-medium">From Mesopotamia to Rome, test your history knowledge.</p>
                    <div class="flex items-center justify-between">
                       <span class="bg-indigo-500/10 text-indigo-400 px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest">Intermediate</span>
                       <span class="text-slate-400 font-bold">10 Questions</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        const subjects = [
            { id: 'maths', name: 'Mathematics', icon: 'calculator', color: 'indigo', desc: 'Algebra, Geometry, and Number Theory.' },
            { id: 'science', name: 'Science', icon: 'flask-conical', color: 'emerald', desc: 'Physics, Chemistry, and the Cosmos.' },
            { id: 'biology', name: 'Biology', icon: 'dna', color: 'pink', desc: 'Genetics, Ecology, and Human Anatomy.' },
            { id: 'english', name: 'English', icon: 'book', color: 'amber', desc: 'Grammar, Literature, and Vocabulary.' },
            { id: 'gk', name: 'General Knowledge', icon: 'globe', color: 'purple', desc: 'World Facts, Capitals, and Current Events.' }
        ];

        const container = document.getElementById('subjects-container');
        container.innerHTML = subjects.map(s => `
            <div class="subject-card card glass group border-transparent hover:border-${s.color}-500 transition-all cursor-pointer" onclick="goToSetup('${s.id}')">
                <div class="w-20 h-20 bg-${s.color}-500/10 rounded-[2rem] flex items-center justify-center text-${s.color}-400 mb-8 group-hover:scale-110 group-hover:rotate-6 transition-all">
                    <i data-lucide="${s.icon}" class="w-10 h-10"></i>
                </div>
                <h3 class="text-3xl font-black font-outfit mb-2 text-slate-200">${s.name}</h3>
                <p class="text-slate-500 font-medium leading-relaxed">${s.desc}</p>
                <div class="mt-8 flex items-center justify-between">
                   <div class="flex -space-x-4">
                      <div class="w-8 h-8 rounded-full border-2 border-slate-900 bg-slate-800"></div>
                      <div class="w-8 h-8 rounded-full border-2 border-slate-900 bg-slate-700"></div>
                      <div class="w-8 h-8 rounded-full border-2 border-slate-900 bg-indigo-600 flex items-center justify-center text-[10px] font-black">+12</div>
                   </div>
                   <button class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-${s.color}-400">
                      <i data-lucide="arrow-right"></i>
                   </button>
                </div>
            </div>
        `).join('');

        function goToSetup(id) {
            localStorage.setItem('qb_active_topic', id);
            window.location.href = 'quiz-setup.html';
        }

        if (window.lucide) lucide.createIcons();
    </script>
</body>
</html>
