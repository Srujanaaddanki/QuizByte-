<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZBYTEE - Quiz Setup</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- pdf.js for text extraction -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            margin-top: 0.5rem;
            z-index: 10;
            max-height: 300px;
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .dropdown-list.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .dropdown-item {
            padding: 1.25rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            color: var(--text-sub);
            border-bottom: 1px solid var(--glass-border);
        }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover {
            background: var(--accent-primary);
            color: white;
            padding-left: 2rem;
        }
        .main-content { padding-top: 6rem; }
        
        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 1rem;
            display: none;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent-primary);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="flex min-h-screen bg-[#0f172a]">

    <!-- SIDEBAR & OVERLAY (Injected by app.js) -->
    <aside id="sidebar"></aside>

    <!-- CONTENT -->
    <main class="main-content flex-grow animate-fade p-6 md:p-12 overflow-y-auto">
        <header class="mb-12">
            <h1 class="text-5xl font-black font-outfit mb-2 tracking-tight">Quiz Setup</h1>
            <p class="text-slate-500 font-bold text-lg">Customization leads to perfection.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div class="space-y-12">
                <!-- SEARCHABLE SUBJECT DROPDOWN -->
                <div class="input-group relative" id="subject-dropdown-container">
                    <label>Select Subject</label>
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 w-6 h-6 text-indigo-500"></i>
                        <input type="text" id="subject-search" placeholder="Search subjects..." class="pl-16 text-xl font-bold bg-slate-900/50 border border-slate-800" autocomplete="off">
                        <i data-lucide="chevron-down" class="absolute right-6 top-1/2 -translate-y-1/2 w-6 h-6 text-slate-500 cursor-pointer"></i>
                    </div>
                    
                    <div class="dropdown-list" id="subject-list">
                        <!-- Subjects will be injected here -->
                    </div>
                </div>

                <!-- DIFFICULTY -->
                <div class="space-y-6">
                    <label class="text-sm font-black uppercase tracking-widest text-slate-500">Select Difficulty</label>
                    <div class="grid grid-cols-3 gap-4" id="diff-selector">
                        <button class="glass p-6 rounded-3xl flex flex-col items-center gap-3 border-2 border-transparent transition-all group" data-val="Easy">
                            <span class="text-3xl">🌱</span>
                            <span class="font-black text-sm uppercase tracking-widest group-hover:text-indigo-400">Easy</span>
                        </button>
                        <button class="glass p-6 rounded-3xl flex flex-col items-center gap-3 border-2 border-indigo-600 transition-all group active" data-val="Medium">
                            <span class="text-3xl">⚔️</span>
                            <span class="font-black text-sm uppercase tracking-widest text-indigo-400">Medium</span>
                        </button>
                        <button class="glass p-6 rounded-3xl flex flex-col items-center gap-3 border-2 border-transparent transition-all group" data-val="Hard">
                            <span class="text-3xl">🔥</span>
                            <span class="font-black text-sm uppercase tracking-widest group-hover:text-indigo-400">Hard</span>
                        </button>
                    </div>
                </div>

                <!-- QUESTION COUNT -->
                <div class="space-y-6">
                    <label class="text-sm font-black uppercase tracking-widest text-slate-500">Number of Questions</label>
                    <div class="grid grid-cols-3 gap-4" id="count-selector">
                        <button class="glass p-6 rounded-3xl flex flex-col items-center gap-2 border-2 border-indigo-600 transition-all group active" data-val="10">
                            <span class="text-2xl font-black">10</span>
                            <span class="font-black text-[10px] uppercase tracking-widest text-indigo-400">Questions</span>
                        </button>
                        <button class="glass p-6 rounded-3xl flex flex-col items-center gap-2 border-2 border-transparent transition-all group" data-val="20">
                            <span class="text-2xl font-black">20</span>
                            <span class="font-black text-[10px] uppercase tracking-widest group-hover:text-indigo-400">Questions</span>
                        </button>
                        <button class="glass p-6 rounded-3xl flex flex-col items-center gap-2 border-2 border-transparent transition-all group" data-val="30">
                            <span class="text-2xl font-black">30</span>
                            <span class="font-black text-[10px] uppercase tracking-widest group-hover:text-indigo-400">Questions</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="space-y-12">
                <!-- UPLOAD FILE (PDF Generated Quiz) -->
                <div class="space-y-6">
                    <label class="text-sm font-black uppercase tracking-widest text-slate-500">Generate from Study Material (AI)</label>
                    <div id="upload-card" class="glass border-2 border-dashed border-slate-700/50 p-12 rounded-[3.5rem] flex flex-col items-center justify-center text-center gap-6 hover:border-indigo-600 transition-all cursor-pointer group relative overflow-hidden">
                        <div class="w-20 h-20 bg-indigo-600/10 rounded-full flex items-center justify-center text-indigo-500 group-hover:scale-110 transition-all shadow-xl shadow-indigo-600/5">
                            <i data-lucide="file-up" class="w-10 h-10"></i>
                        </div>
                        <div>
                            <h3 id="upload-title" class="text-xl font-bold mb-2">Upload PDF</h3>
                            <p id="upload-status" class="text-slate-500 text-sm font-medium">Extract questions from your notes</p>
                        </div>
                        
                        <div class="progress-container" id="progress-container">
                            <div class="progress-bar" id="progress-bar"></div>
                        </div>

                        <input type="file" id="file-input" accept=".pdf" class="hidden">
                    </div>
                    
                    <button id="generate-btn" class="btn-primary flex items-center justify-center gap-3 text-lg h-16 hidden">
                        <i data-lucide="sparkles"></i>
                        Generate Quiz from File
                    </button>
                </div>

                <!-- START BUTTON -->
                <div class="pt-10">
                    <button id="start-btn" class="btn-primary flex items-center justify-center gap-6 text-3xl h-24 shadow-2xl shadow-indigo-600/30 hover:shadow-indigo-600/50 hover:scale-[1.02] active:scale-95 transition-all">
                        START CHALLENGE
                        <i data-lucide="zap" class="w-10 h-10 fill-white"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pdf-processor.js"></script>
    <script>
        // SUBJECT DATABASE
        const subjects = [
            "Maths", "Science", "English", "General Knowledge"
        ];

        const searchInput = document.getElementById('subject-search');
        const listContainer = document.getElementById('subject-list');
        const dropdownContainer = document.getElementById('subject-dropdown-container');

        // Initial topic from Explore page
        const initialTopic = localStorage.getItem('qb_active_topic') || 'Maths';
        searchInput.value = initialTopic.charAt(0).toUpperCase() + initialTopic.slice(1).toLowerCase();

        // Dropdown Logic
        const renderDropdown = (filter = "") => {
            const filtered = subjects.filter(s => s.toLowerCase().includes(filter.toLowerCase()));
            listContainer.innerHTML = filtered.map(s => `<div class="dropdown-item" onclick="selectSubject('${s}')">${s}</div>`).join('');
            if (filtered.length > 0) listContainer.classList.add('show');
            else listContainer.classList.remove('show');
        };

        searchInput.addEventListener('focus', () => renderDropdown(searchInput.value));
        searchInput.addEventListener('input', (e) => renderDropdown(e.target.value));

        document.addEventListener('click', (e) => {
            if (!dropdownContainer.contains(e.target)) {
                listContainer.classList.remove('show');
            }
        });

        window.selectSubject = (val) => {
            searchInput.value = val;
            listContainer.classList.remove('show');
        };

        // Selectors Logic
        let selectedDiff = "Medium";
        let selectedCount = "10";
        let selectedMode = "Solo";

        const setupSelector = (id, callback) => {
            document.querySelectorAll(`#${id} button`).forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll(`#${id} button`).forEach(b => {
                        b.classList.remove('border-indigo-600', 'active');
                        const span = b.querySelector('span:last-child');
                        if (span && span.classList.contains('text-indigo-400')) span.classList.remove('text-indigo-400');
                        const h = b.querySelector('span:first-child');
                        if (h && h.classList.contains('text-indigo-400')) h.classList.remove('text-indigo-400');
                    });
                    btn.classList.add('border-indigo-600', 'active');
                    const span = btn.querySelector('span:last-child');
                    if (span) span.classList.add('text-indigo-400');
                    const h = btn.querySelector('span:first-child');
                    if (h) h.classList.add('text-indigo-400');
                    callback(btn.dataset.val);
                });
            });
        };

        setupSelector('diff-selector', (val) => { selectedDiff = val; });
        setupSelector('count-selector', (val) => { selectedCount = val; });

        // Start Button Logic
        document.getElementById('start-btn').onclick = () => {
            if (!searchInput.value) {
                alert("Please select a subject first!");
                return;
            }
            localStorage.setItem('qb_active_topic', searchInput.value.toLowerCase());
            localStorage.setItem('qb_active_diff', selectedDiff);
            localStorage.setItem('qb_active_count', selectedCount);
            localStorage.removeItem('qb_generated_quiz'); // Clear any previous PDF quiz
            window.location.href = 'quiz.html';
        };

        // File Selection UI (Handled by pdf-processor.js eventually)
        const fileInput = document.getElementById('file-input');
        const uploadCard = document.getElementById('upload-card');
        
        uploadCard.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('upload-title').innerText = file.name;
                document.getElementById('upload-status').innerText = "File Ready. Click below to generate!";
                document.getElementById('generate-btn').classList.remove('hidden');
            }
        };

        if (window.lucide) lucide.createIcons();
    </script>
</body>
</html>
